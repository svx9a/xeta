  <style>
    :root {
      /* Mercury & White Theme - Primary Colors */
      --mercury-50: #FAFAFA;
      /* Lightest mercury - almost white */
      --mercury-100: #F5F5F5;
      /* Very light mercury */
      --mercury-200: #E5E5E5;
      /* Light mercury */
      --mercury-300: #D4D4D4;
      /* Light medium mercury */
      --mercury-400: #A3A3A3;
      /* Medium mercury */
      --mercury-500: #737373;
      /* True mercury - silver gray */
      --mercury-600: #525252;
      /* Dark mercury */
      --mercury-700: #404040;
      /* Darker mercury */
      --mercury-800: #262626;
      /* Very dark mercury */
      --mercury-900: #171717;
      /* Darkest mercury - near black */

      /* White variations */
      --white-pure: #FFFFFF;
      /* Pure white */
      --white-soft: #FEFEFE;
      /* Soft white */
      --white-warm: #FDFDFD;
      /* Warm white */

      /* Background colors */
      --bg-primary: var(--white-pure);
      /* Main background */
      --bg-secondary: var(--mercury-50);
      /* Secondary backgrounds */
      --bg-tertiary: var(--mercury-100);
      /* Tertiary backgrounds */
      --bg-accent: var(--mercury-200);
      /* Accent backgrounds */

      /* Text colors */
      --text-primary: var(--mercury-900);
      /* Primary text */
      --text-secondary: var(--mercury-600);
      /* Secondary text */
      --text-tertiary: var(--mercury-400);
      /* Tertiary text */
      --text-inverse: var(--white-pure);
      /* Text on dark backgrounds */

      /* Border colors */
      --border-light: var(--mercury-200);
      /* Light borders */
      --border-medium: var(--mercury-300);
      /* Medium borders */
      --border-dark: var(--mercury-400);
      /* Dark borders */

      /* Interactive states */
      --hover-bg: var(--mercury-100);
      /* Hover backgrounds */
      --focus-ring: var(--mercury-400);
      /* Focus ring color */
      --active-bg: var(--mercury-200);
      /* Active backgrounds */

      /* Glassmorphism effects */
      --glass-bg: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(255, 255, 255, 0.2);
      --glass-shadow: rgba(255, 255, 255, 0.1);

      /* Enhanced shadows for depth and gloss */
      --shadow-light: rgba(115, 115, 115, 0.08);
      --shadow-medium: rgba(115, 115, 115, 0.12);
      --shadow-dark: rgba(115, 115, 115, 0.16);
      --shadow-glow: rgba(115, 115, 115, 0.06);

      /* Accent colors - subtle mercury variations */
      --accent-primary: var(--mercury-500);
      /* Primary accent */
      --accent-hover: var(--mercury-600);
      /* Accent hover */
      --accent-light: var(--mercury-200);
      /* Light accent */

      /* Status colors - mercury-themed */
      --success: var(--mercury-600);
      /* Success - darker mercury */
      --warning: var(--mercury-500);
      /* Warning - medium mercury */
      --error: var(--mercury-700);
      /* Error - dark mercury */

      /* Typography */
      --font-primary: 'Space Grotesk', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
    }

    /* Global Responsive Base */
    html {
      font-size: 14px;
      /* Mobile First Base */
    }

    @media (min-width: 640px) {
      html {
        font-size: 15px;
      }
    }

    @media (min-width: 1024px) {
      html {
        font-size: 16px;
      }
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-secondary);
      font-family: var(--font-sans);
      line-height: 1.6;
      margin: 0;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* Typography Scale - Mercury & White Theme */
    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      color: var(--text-primary);
      font-family: var(--font-primary);
      font-weight: 600;
      line-height: 1.2;
      margin: 0 0 0.5em 0;
      letter-spacing: -0.025em;
    }

    h1 {
      font-size: 2.25rem;
      font-weight: 700;
    }

    h2 {
      font-size: 1.875rem;
      font-weight: 600;
    }

    h3 {
      font-size: 1.5rem;
      font-weight: 600;
    }

    h4 {
      font-size: 1.25rem;
      font-weight: 600;
    }

    h5 {
      font-size: 1.125rem;
      font-weight: 600;
    }

    h6 {
      font-size: 1rem;
      font-weight: 600;
    }

    p {
      color: var(--text-secondary);
      line-height: 1.6;
      margin: 0 0 1em 0;
    }

    /* Spacing Scale - 8px Base Grid */
    .space-y-1>*+* {
      margin-top: 0.25rem;
    }

    /* 4px */
    .space-y-2>*+* {
      margin-top: 0.5rem;
    }

    /* 8px */
    .space-y-3>*+* {
      margin-top: 0.75rem;
    }

    /* 12px */
    .space-y-4>*+* {
      margin-top: 1rem;
    }

    /* 16px */
    .space-y-6>*+* {
      margin-top: 1.5rem;
    }

    /* 24px */
    .space-y-8>*+* {
      margin-top: 2rem;
    }

    /* 32px */
    .space-y-12>*+* {
      margin-top: 3rem;
    }

    /* 48px */
    .space-y-16>*+* {
      margin-top: 4rem;
    }

    /* 64px */

    /* Component Styling - Enhanced Glassmorphism */
    .btn-primary {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      color: var(--mercury-700);
      border: 1px solid var(--glass-border);
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      font-weight: 600;
      font-size: 0.875rem;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 4px 20px var(--shadow-glow), 0 1px 3px var(--shadow-light);
    }

    .btn-primary:hover {
      background: rgba(255, 255, 255, 0.95);
      border-color: rgba(255, 255, 255, 0.4);
      transform: translateY(-2px);
      box-shadow: 0 8px 30px var(--shadow-medium), 0 1px 3px var(--shadow-light);
    }

    .btn-secondary {
      background: var(--glass-bg);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      color: var(--mercury-600);
      border: 1px solid var(--glass-border);
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      font-weight: 600;
      font-size: 0.875rem;
      transition: all 0.3s ease;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      box-shadow: 0 2px 12px var(--shadow-glow);
    }

    .card {
      background: var(--glass-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 1rem;
      box-shadow: 0 8px 32px var(--shadow-glow), 0 1px 3px var(--shadow-light);
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card:hover {
      background: rgba(255, 255, 255, 0.9);
      border-color: rgba(255, 255, 255, 0.3);
      box-shadow: 0 12px 40px var(--shadow-medium), 0 1px 3px var(--shadow-light);
      transform: translateY(-4px);
    }

    .input-field {
      width: 100%;
      background-color: var(--white-pure);
      border: 1px solid var(--border-medium);
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      color: var(--text-primary);
      transition: all 0.2s ease;
      min-height: 44px;
    }

    .input-field:focus {
      outline: none;
      border-color: var(--focus-ring);
      box-shadow: 0 0 0 3px rgba(163, 163, 163, 0.1);
    }

    .input-field::placeholder {
      color: var(--text-tertiary);
    }

    /* Standard Interactive Targets */
    button,
    input,
    select,
    textarea {
      min-height: 48px;
    }

    @media (min-width: 768px) {

      button,
      input,
      select,
      textarea {
        min-height: auto;
      }
    }

    /* Scrollbar Styling */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-secondary);
    }

    ::-webkit-scrollbar-thumb {
      background: #CBD5E1;
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #94A3B8;
    }

    /* Prevent text selection glare */
    ::selection {
      background: rgba(10, 52, 66, 0.1);
      color: var(--text-primary);
    }
